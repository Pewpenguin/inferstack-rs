global:
  scrape_interval: 10s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "inferstack"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["app:8080"]
        labels:
          service: "inferstack-api"
          environment: "production"

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis-cache"
          environment: "production"